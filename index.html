<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PULSO — genera tu dieta semanal personalizada en segundos, con recetas ilustradas y su modo de elaboración paso a paso." />
    <title>PULSO · Come con intención</title>
    <!-- PWA: instalable desde el navegador ("Añadir a pantalla de inicio")
         en Android e iOS, sin pasar por ninguna tienda de apps. El manifest
         y el service worker los genera vite-plugin-pwa en el build; estas
         etiquetas cubren lo que Safari/iOS no lee del manifest. -->
    <meta name="theme-color" content="#0F2C56" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PULSO" />
    <!-- Tipografías del rediseño retro: Anton (titulares condensados),
         Azeret Mono (cuerpo) e Instrument Serif (acentos en cursiva). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Azeret+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
    <style>body { background: #F2EDE9; margin: 0; }</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
