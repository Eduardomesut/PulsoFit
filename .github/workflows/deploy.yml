name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el despliegue a Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; no cancela los que estén en curso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Tests
        # Lógica pura e invariantes del catálogo de recetas: si fallan, no se despliega.
        run: npm test

      - name: Compilar
        run: npm run build
        env:
          # Credenciales públicas de Supabase (Settings → Variables). Si no se
          # definen, la app se compila igual y funciona en modo invitado.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          # Habilita GitHub Pages automáticamente la primera vez
          enablement: true

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
