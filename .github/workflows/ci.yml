name: CI

on:
  push:
    # En main ya compila deploy.yml antes de desplegar; aquí cubrimos el resto
    branches-ignore: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Tests
        run: npm test

      - name: Compilar (type-check + build)
        run: npm run build
